{% extends "base.html" %}

{% block content %}
<div class="glass-card large">
    <h2 style="text-align: center;">Patient Clinical Data</h2>
    <p style="text-align: center;">Enter the 13 clinical features for the heart disease prediction model.</p>
    
    <form action="{{ url_for('predict') }}" method="POST">
        <div class="form-grid">
            <!-- Feature 1 -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" class="form-control" required placeholder="Years">
            </div>
            
            <!-- Feature 2 -->
            <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" name="sex" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>
            
            <!-- Feature 3 -->
            <div class="form-group">
                <label for="cp">Chest Pain Type (1-4)</label>
                <select id="cp" name="cp" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Typical Angina (1)</option>
                    <option value="2">Atypical Angina (2)</option>
                    <option value="3">Non-anginal Pain (3)</option>
                    <option value="4">Asymptomatic (4)</option>
                </select>
            </div>
            
            <!-- Feature 4 -->
            <div class="form-group">
                <label for="trestbps">Resting BP (mm Hg)</label>
                <input type="number" id="trestbps" name="trestbps" class="form-control" required placeholder="e.g. 120">
            </div>
            
            <!-- Feature 5 -->
            <div class="form-group">
                <label for="chol">Serum Cholestoral (mg/dl)</label>
                <input type="number" id="chol" name="chol" class="form-control" required placeholder="e.g. 200">
            </div>
            
            <!-- Feature 6 -->
            <div class="form-group">
                <label for="fbs">Fasting Blood Sugar > 120 mg/dl</label>
                <select id="fbs" name="fbs" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes (True)</option>
                    <option value="0">No (False)</option>
                </select>
            </div>
            
            <!-- Feature 7 -->
            <div class="form-group">
                <label for="restecg">Resting ECG Results (0-2)</label>
                <select id="restecg" name="restecg" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">Normal (0)</option>
                    <option value="1">ST-T Wave Abnormality (1)</option>
                    <option value="2">Left Ventricular Hypertrophy (2)</option>
                </select>
            </div>
            
            <!-- Feature 8 -->
            <div class="form-group">
                <label for="thalach">Max Heart Rate Achieved</label>
                <input type="number" id="thalach" name="thalach" class="form-control" required placeholder="e.g. 150">
            </div>
            
            <!-- Feature 9 -->
            <div class="form-group">
                <label for="exang">Exercise Induced Angina</label>
                <select id="exang" name="exang" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <!-- Feature 10 -->
            <div class="form-group">
                <label for="oldpeak">ST Depression (Oldpeak)</label>
                <input type="number" step="0.1" id="oldpeak" name="oldpeak" class="form-control" required placeholder="e.g. 1.5">
            </div>
            
            <!-- Feature 11 -->
            <div class="form-group">
                <label for="slope">Slope of Peak Exercise ST (1-3)</label>
                <select id="slope" name="slope" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Upsloping (1)</option>
                    <option value="2">Flat (2)</option>
                    <option value="3">Downsloping (3)</option>
                </select>
            </div>
            
            <!-- Feature 12 -->
            <div class="form-group">
                <label for="ca">Number of Major Vessels (0-3)</label>
                <input type="number" id="ca" name="ca" min="0" max="3" class="form-control" required placeholder="0-3">
            </div>
            
            <!-- Feature 13 -->
            <div class="form-group">
                <label for="thal">Thalassemia (3, 6, 7)</label>
                <select id="thal" name="thal" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="3">Normal (3)</option>
                    <option value="6">Fixed Defect (6)</option>
                    <option value="7">Reversable Defect (7)</option>
                </select>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <button type="submit" class="btn" style="max-width: 400px; padding: 1.2rem;">Run Inference Model</button>
        </div>
    </form>
</div>
{% endblock %}
